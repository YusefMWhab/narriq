services:
  web:
    restart: always
    build: .
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG=False
    command: >
      sh -c "until pg_isready -h db -p 5432; do sleep 1; done &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"

  db:
    restart: always
    image: postgres:15
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    restart: always

  # =====================
  # DEFAULT WORKER
  # =====================
  celery_default:
    restart: always
    build: .
  
    environment:
      - PYTHONUNBUFFERED=1
    command: celery -A config worker -Q default -l info
    volumes:
      - .:/app
    depends_on:
      - redis
      - web

  # =====================
  # Nginx
  # =====================
  nginx:
    restart: always
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./productionfiles:/app/productionfiles:ro
      - ./media:/app/media:ro
      - /home/ubuntu/narriq/certbot/conf:/etc/letsencrypt:ro
      - /home/ubuntu/narriq/certbot/www:/var/www/certbot
    depends_on:
      - web
volumes:
  db_data:
